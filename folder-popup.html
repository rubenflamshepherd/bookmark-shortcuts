<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bookmark folder</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #ffffff;
        --fg: #202124;
        --muted: #5f6368;
        --hover: #f1f3f4;
        --border: #dadce0;
        --folder: #5f6368;
        --error: #d93025;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #292a2d;
          --fg: #e8eaed;
          --muted: #9aa0a6;
          --hover: #3c4043;
          --border: #3c4043;
          --folder: #bdc1c6;
          --error: #f28b82;
        }
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; }
      body {
        width: 280px;
        max-height: 460px;
        overflow: hidden;
        border-radius: 12px;
        background: var(--bg);
        color: var(--fg);
        font: 13px/1.35 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      header {
        display: flex;
        align-items: center;
        gap: 6px;
        height: 38px;
        padding: 3px 8px;
        border-bottom: 1px solid var(--border);
      }
      header[hidden] { display: none; }
      .heading {
        display: flex;
        align-items: center;
        min-width: 0;
        flex: 1;
      }
      h1 {
        margin: 0;
        overflow: hidden;
        font-size: 13px;
        font-weight: 600;
        line-height: 32px;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .hint {
        flex: 0 0 auto;
        margin: 0 2px 0 8px;
        color: var(--muted);
        font-size: 11px;
        white-space: nowrap;
      }
      .folder-icon {
        position: relative;
        flex: 0 0 auto;
        width: 16px;
        height: 14px;
        color: var(--folder);
      }
      .header-folder-icon { margin: 0 4px 0 2px; }
      .folder-icon::before {
        content: "";
        position: absolute;
        inset: 4px 1px 1px;
        border: 2px solid currentColor;
        border-radius: 2px;
      }
      .folder-icon::after {
        content: "";
        position: absolute;
        top: 1px;
        left: 2px;
        width: 7px;
        height: 5px;
        border: 2px solid currentColor;
        border-bottom: 0;
        border-radius: 2px 2px 0 0;
      }
      .back {
        flex: 0 0 auto;
        width: 28px;
        height: 28px;
        padding: 0;
        border: 0;
        border-radius: 4px;
        background: transparent;
        color: var(--fg);
        cursor: pointer;
        font: 19px/1 sans-serif;
      }
      .back:hover, .back:focus-visible { background: var(--hover); }
      .back[hidden] { display: none; }
      main { max-height: 422px; overflow-y: auto; padding: 4px; }
      ul { margin: 0; padding: 0; list-style: none; }
      .item {
        display: grid;
        grid-template-columns: 20px minmax(0, 1fr) 22px 12px;
        align-items: center;
        gap: 6px;
        width: 100%;
        height: 34px;
        padding: 0 8px;
        border: 0;
        border-radius: 4px;
        background: transparent;
        color: var(--fg);
        text-align: left;
        cursor: pointer;
      }
      .item:hover, .item:focus-visible {
        outline: none;
        background: var(--hover);
      }
      .icon {
        display: block;
        width: 16px;
        height: 16px;
        justify-self: center;
      }
      img.icon { object-fit: contain; }
      .item-title {
        display: block;
        overflow: hidden;
        font-weight: 400;
        line-height: 34px;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .shortcut {
        color: var(--muted);
        font-size: 12px;
        text-align: right;
      }
      .chevron { color: var(--muted); font-size: 17px; line-height: 1; text-align: right; }
      .empty {
        margin: 0;
        padding: 24px 20px;
        color: var(--muted);
        text-align: center;
      }
      .error { color: var(--error); }
    </style>
  </head>
  <body>
    <header id="folder-header" hidden>
      <button class="back" id="back" type="button" aria-label="Go to parent folder" hidden>‹</button>
      <span class="folder-icon header-folder-icon" id="folder-icon" aria-hidden="true"></span>
      <div class="heading">
        <h1 id="folder-title">Bookmark folder</h1>
      </div>
      <p class="hint" id="folder-hint">1–9</p>
    </header>
    <main>
      <ul id="items" role="menu" aria-label="Folder items"></ul>
      <p class="empty" id="empty" hidden></p>
    </main>
    <script src="folder-popup.js"></script>
  </body>
</html>
